# GitHub Action Workflow for Recalculating Skill Quality Scores
#
# Runs daily to update community metrics (views, downloads, favorites)
# and recalculate composite quality scores for all skills.
#
# This ensures the "Community" dimension reflects actual engagement data
# after skills mature beyond the 7-day grace period.

name: Recalculate Skill Scores

on:
  schedule:
    # Run daily at 03:00 UTC (11:00 Beijing Time)
    - cron: '0 3 * * *'

  workflow_dispatch:
    inputs:
      slug:
        description: 'Score specific skill only (leave empty for all)'
        type: string
        default: ''
      limit:
        description: 'Maximum skills to process (leave empty for all)'
        type: string
        default: ''
      concurrency:
        description: 'Parallel database updates (1-10)'
        type: string
        default: '5'
      dry_run:
        description: 'Preview without updating database'
        type: boolean
        default: false
      cli_version:
        description: 'CLI version (default: latest)'
        type: string
        default: 'latest'

concurrency:
  group: recalculate-scores
  cancel-in-progress: false

jobs:
  recalculate:
    runs-on: self-hosted
    timeout-minutes: 1440
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: marketplace,skillstore

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          sparse-checkout: |
            .github/actions
            scripts
            skills
          fetch-depth: 1

      - name: Download Skillstore CLI
        uses: ./.github/actions/download-skillstore-cli
        with:
          version: ${{ inputs.cli_version || 'latest' }}
          token: ${{ steps.app-token.outputs.token }}
          cache-dir: /home/runner/_work/_cache/skillstore-cli

      - name: Recalculate quality scores
        id: score
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # lets `skill score` (CLI >= 1.32.0) bust the long-lived detail cache for
          # rescored skills so the new score shows on the next request
          CACHE_INVALIDATE_SECRET: ${{ secrets.CACHE_INVALIDATE_SECRET }}
          INPUT_SLUG: ${{ inputs.slug }}
          INPUT_LIMIT: ${{ inputs.limit }}
          INPUT_CONCURRENCY: ${{ inputs.concurrency || '5' }}
          INPUT_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          echo "=== Skill Quality Score Recalculation ==="
          echo "Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          # Build wrapper args. The wrapper script (scripts/recalculate-scores.sh)
          # runs the CLI in per-slug mode with retry/backoff so a single
          # breakdown update TimeoutError does not take down the whole run.
          WRAPPER_ARGS=(
            --cli "$GITHUB_WORKSPACE/skillstore-cli"
            --concurrency "$INPUT_CONCURRENCY"
            --max-attempts 3
            --retry-base-seconds 5
          )

          SUPPORTS_SLUGS=0
          SCORE_HELP=$("$GITHUB_WORKSPACE/skillstore-cli" skill score --help 2>&1 || true)
          if printf '%s\n' "$SCORE_HELP" | grep -q -- '--slugs'; then
            SUPPORTS_SLUGS=1
          else
            echo "::warning::Downloaded CLI does not advertise --slugs support; falling back to legacy --recalculate mode."
          fi

          if [ -n "$INPUT_SLUG" ]; then
            if [ "$SUPPORTS_SLUGS" -ne 1 ]; then
              echo "::error::Single-skill mode requires a CLI with --slugs support. The downloaded release asset appears older than the resolved tag."
              exit 2
            fi
            # Single-skill mode: per-slug wrapper
            WRAPPER_ARGS+=( --slugs "$INPUT_SLUG" )
            echo "Mode: Single skill ($INPUT_SLUG)"
          elif [ "$SUPPORTS_SLUGS" -eq 1 ]; then
            # Scheduled/default full recalculation must still use the
            # per-slug isolation wrapper when the downloaded CLI supports
            # it. Enumerate published skills from reports and pass explicit
            # slugs instead of the legacy top-level --recalculate retry path.
            # Some packages contain nested/example SKILL.md files that are
            # resources, not marketplace entries.
            mapfile -t ALL_SLUGS < <(find skills -name "skill-report.json" -type f -print | sed 's|^skills/||; s|/skill-report.json$||' | sort)
            if [ -n "$INPUT_LIMIT" ]; then
              if ! [[ "$INPUT_LIMIT" =~ ^[1-9][0-9]*$ ]]; then
                echo "::error::limit must be a positive integer when provided: $INPUT_LIMIT"
                exit 2
              fi
              mapfile -t ALL_SLUGS < <(printf '%s\n' "${ALL_SLUGS[@]}" | head -n "$INPUT_LIMIT")
              echo "Mode: All skills (limit $INPUT_LIMIT)"
            else
              echo "Mode: All skills"
            fi

            if [ "${#ALL_SLUGS[@]}" -eq 0 ]; then
              echo "::error::No skills found to recalculate. Sparse checkout may be missing skills/."
              exit 1
            fi

            SLUGS_FILE="$RUNNER_TEMP/recalculate-slugs.txt"
            printf '%s\n' "${ALL_SLUGS[@]}" > "$SLUGS_FILE"
            WRAPPER_ARGS+=( --slugs-file "$SLUGS_FILE" )
            echo "Skills queued: ${#ALL_SLUGS[@]}"
            echo "Slug list file: $SLUGS_FILE"
          else
            # Compatibility fallback for mislabeled/older CLI release
            # assets (observed: cli-v1.28.0 asset reporting 1.27.0).
            # This restores the historical all-skills path instead of
            # failing before any skill is scored.
            if [ -n "$INPUT_LIMIT" ]; then
              if ! [[ "$INPUT_LIMIT" =~ ^[1-9][0-9]*$ ]]; then
                echo "::error::limit must be a positive integer when provided: $INPUT_LIMIT"
                exit 2
              fi
              WRAPPER_ARGS+=( --limit "$INPUT_LIMIT" )
              echo "Mode: All skills via legacy CLI (limit $INPUT_LIMIT)"
            else
              echo "Mode: All skills via legacy CLI"
            fi
            WRAPPER_ARGS+=( --recalculate )
          fi

          if [ "$INPUT_CONCURRENCY" != "5" ]; then
            echo "Concurrency: $INPUT_CONCURRENCY"
          fi

          if [ "$INPUT_DRY_RUN" = "true" ]; then
            WRAPPER_ARGS+=( --dry-run )
            echo "Dry Run: Yes"
          fi

          echo ""
          echo "Running: scripts/recalculate-scores.sh ${WRAPPER_ARGS[*]}"
          echo "----------------------------------------"

          # Run wrapper. Output to both stdout and score-output.log for
          # backwards-compatible grep parsing. GitHub Actions runs bash
          # with `-e`; temporarily disable it so we can inspect EXIT_CODE
          # and preserve partial-success behavior.
          set +e
          bash scripts/recalculate-scores.sh "${WRAPPER_ARGS[@]}" 2>&1 | tee score-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          echo ""
          echo "----------------------------------------"

          # Parse results from log. The wrapper prints aggregate
          # Processed/Updated/Errors/Duration lines at the very end; the
          # earlier per-slug lines emitted by the CLI are ignored.
          PROCESSED=$(grep -oP 'Processed:\s*\K\d+' score-output.log | tail -n1 || echo "0")
          UPDATED=$(grep -oP 'Updated:\s*\K\d+' score-output.log | tail -n1 || echo "0")
          ERRORS=$(grep -oP 'Errors:\s*\K\d+' score-output.log | tail -n1 || echo "0")
          DURATION=$(grep -oP 'Duration:\s*\K\d+' score-output.log | tail -n1 || echo "0")

          echo "processed=$PROCESSED" >> $GITHUB_OUTPUT
          echo "updated=$UPDATED" >> $GITHUB_OUTPUT
          echo "errors=$ERRORS" >> $GITHUB_OUTPUT
          echo "duration=${DURATION}s" >> $GITHUB_OUTPUT
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Treat partial per-slug failures as a successful run only when
          # at least one slug succeeded. A non-zero wrapper exit means the
          # run made no successful progress (all/global failure) and must
          # keep the workflow red.
          SUCCESSFUL=$(( ${PROCESSED:-0} - ${ERRORS:-0} ))
          if [ "$EXIT_CODE" -ne 0 ]; then
            if [ "${PROCESSED:-0}" -eq 0 ] || [ "$SUCCESSFUL" -le 0 ]; then
              echo "::error::Recalculation failed: no skills were scored successfully."
              exit "$EXIT_CODE"
            fi

            echo "::warning::Score recalculation finished with $ERRORS error(s) after processing $PROCESSED skill(s); keeping the workflow green because it made progress."
          elif [ "${ERRORS:-0}" -gt 0 ]; then
            echo "::warning::Score recalculation finished with $ERRORS error(s) after processing $PROCESSED skill(s)."
          fi

      - name: Cleanup
        if: always()
        run: |
          rm -f score-output.log 2>/dev/null || true

      - name: Summary
        if: always()
        env:
          PROCESSED: ${{ steps.score.outputs.processed }}
          UPDATED: ${{ steps.score.outputs.updated }}
          ERRORS: ${{ steps.score.outputs.errors }}
          DURATION: ${{ steps.score.outputs.duration }}
          EXIT_CODE: ${{ steps.score.outputs.exit_code }}
          DRY_RUN: ${{ inputs.dry_run || 'false' }}
          SLUG: ${{ inputs.slug }}
          CLI_VERSION: ${{ inputs.cli_version || 'latest' }}
        run: |
          MODE="All skills"
          if [ -n "$SLUG" ]; then
            MODE="Single skill ($SLUG)"
          fi

          UPDATED_DISPLAY="$UPDATED"
          if [ "$DRY_RUN" = "true" ]; then
            UPDATED_DISPLAY="0 (dry run)"
          fi

          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## Skill Quality Score Recalculation

          | Metric | Value |
          |--------|-------|
          | Mode | $MODE |
          | Processed | $PROCESSED |
          | Updated | $UPDATED_DISPLAY |
          | Errors | $ERRORS |
          | Duration | $DURATION |
          | Dry Run | $DRY_RUN |
          | CLI Version | \`$CLI_VERSION\` |

          EOF

          if [ "$EXIT_CODE" = "0" ]; then
            echo "✅ Score recalculation completed successfully" >> $GITHUB_STEP_SUMMARY
          elif [ "$PROCESSED" -gt 0 ]; then
            echo "⚠️ Score recalculation completed with warnings (non-fatal exit code: $EXIT_CODE)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Score recalculation failed before making progress (exit code: $EXIT_CODE)" >> $GITHUB_STEP_SUMMARY
          fi

          cat << 'EOF' >> $GITHUB_STEP_SUMMARY

          ### What Changed
          - Community scores updated based on latest engagement metrics (views, downloads, favorites)
          - Skills older than 7 days now use actual metrics instead of neutral 50 score
          - Maintainability recency scores refreshed based on update timestamps
          EOF
