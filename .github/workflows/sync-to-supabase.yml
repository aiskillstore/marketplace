name: Sync to Supabase (Incremental)

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  workflow_run:
    workflows: ["On PR Merge - Approve Skill"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      slugs:
        description: 'Specific skill slugs to sync (comma or space separated, optional)'
        type: string
        default: ''
      full_sync:
        description: 'Force full sync (ignore incremental)'
        type: boolean
        default: false
      skip_cache_warm:
        description: 'Skip cache warming after sync'
        type: boolean
        default: false

concurrency:
  group: sync-supabase
  cancel-in-progress: false

jobs:
  sync:
    runs-on: self-hosted
    timeout-minutes: 240
    outputs:
      synced_slugs: ${{ steps.sync.outputs.synced_slugs }}
      skip_sync: ${{ steps.changes.outputs.skip_sync }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Full history needed to diff against last successful sync
          fetch-depth: 0

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: marketplace,skillstore

      - name: Find last successful sync commit
        id: last_sync
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find the commit SHA of the last successful sync workflow run
          # This ensures we catch ALL changes since the last sync, even if multiple PRs merged
          LAST_SHA=$(gh api "repos/${{ github.repository }}/actions/workflows/sync-to-supabase.yml/runs?status=success&per_page=5" \
            --jq '.workflow_runs[0].head_sha' 2>/dev/null || echo "")
          
          if [ -n "$LAST_SHA" ] && [ "$LAST_SHA" != "null" ] && [ "$LAST_SHA" != "${{ github.sha }}" ]; then
            # Verify the commit exists in our history
            if git cat-file -e "$LAST_SHA" 2>/dev/null; then
              echo "Last successful sync at: $LAST_SHA"
              echo "base_sha=$LAST_SHA" >> $GITHUB_OUTPUT
            else
              echo "Last sync commit $LAST_SHA not in history, falling back to HEAD~1"
              echo "base_sha=HEAD~1" >> $GITHUB_OUTPUT
            fi
          else
            echo "No previous successful sync found, falling back to HEAD~1"
            echo "base_sha=HEAD~1" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed skills
        id: changes
        run: |
          BASE_SHA="${{ steps.last_sync.outputs.base_sha }}"
          echo "Comparing HEAD against: $BASE_SHA"
          
          # Find published skill paths from audit reports. Some packages contain
          # nested/example SKILL.md files that are resources, not marketplace entries.
          find_all_skills() {
            for entry in $(find skills -name "skill-report.json" -type f 2>/dev/null); do
              # Extract directory path relative to skills/
              dir=$(dirname "$entry")
              echo "${dir#skills/}"
            done | sort -u
          }
          
          # Get skill slug from a changed file path
          # Supports both flat (skills/name/) and namespaced (skills/owner/name/)
          get_skill_slug() {
            local path="$1"
            local first=$(echo "$path" | cut -d'/' -f1)
            local first_two=$(echo "$path" | cut -d'/' -f1,2)
            
            # Check if first segment is a published skill (flat structure)
            if [ -f "skills/$first/skill-report.json" ]; then
              echo "$first"
            # Check if first two segments are a published skill (namespaced: owner/name)
            elif [ -f "skills/$first_two/skill-report.json" ]; then
              echo "$first_two"
            fi
          }
          
          if [ -n "${{ inputs.slugs }}" ]; then
            echo "Specific slugs requested: ${{ inputs.slugs }}"
            CHANGED=$(echo "${{ inputs.slugs }}" | tr ',' ' ' | tr '\n' ' ' | tr -s ' ' | xargs -n1 | sed 's|^skills/||' | sort -u | tr '\n' ' ')
            echo "mode=manual-slugs" >> $GITHUB_OUTPUT
          elif [ "${{ inputs.full_sync }}" = "true" ]; then
            echo "Full sync requested"
            CHANGED=$(find_all_skills | tr '\n' ' ')
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            # Get changed paths since last successful sync and extract skill slugs
            # IMPORTANT: Use explicit HEAD to compare commits, not working directory
            # On self-hosted runners, working directory may have stale files
            CHANGED=$(git diff "$BASE_SHA" HEAD --name-only 2>/dev/null | \
              grep '^skills/' | \
              sed 's|^skills/||' | \
              while read -r path; do
                get_skill_slug "$path"
              done | sort -u | tr '\n' ' ')
            echo "mode=incremental" >> $GITHUB_OUTPUT
            echo "Diff range: $BASE_SHA..HEAD"
          fi
          
          echo "changed_skills=$CHANGED" >> $GITHUB_OUTPUT
          
          if [ -z "$CHANGED" ]; then
            echo "No skills to sync"
            echo "skip_sync=true" >> $GITHUB_OUTPUT
          else
            echo "Skills to sync: $CHANGED"
            echo "skip_sync=false" >> $GITHUB_OUTPUT
          fi

      - name: Download skillstore-cli
        if: steps.changes.outputs.skip_sync != 'true'
        uses: ./.github/actions/download-skillstore-cli
        with:
          token: ${{ steps.app-token.outputs.token }}
          cache-dir: /home/runner/_work/_cache/skillstore-cli

      - name: Sync skills to Supabase
        id: sync
        if: steps.changes.outputs.skip_sync != 'true'
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          CHANGED_SKILLS: ${{ steps.changes.outputs.changed_skills }}
          SYNC_MODE: ${{ steps.changes.outputs.mode }}
        run: |
          echo "Sync mode: $SYNC_MODE"
          echo "Syncing skills: $CHANGED_SKILLS"

          # Transform space-separated relative paths to comma-separated full paths
          # Input:  "author1/skill1 author2/skill2"
          # Output: "skills/author1/skill1,skills/author2/skill2"
          # Filter empty lines to prevent trailing "skills/" from spaces
          SKILL_PATHS=$(echo "$CHANGED_SKILLS" | tr ' ' '\n' | grep -v '^$' | sed 's|^|skills/|' | tr '\n' ',' | sed 's/,$//')

          echo "Skill paths: $SKILL_PATHS"

          set -o pipefail

          configure_tls() {
            if [ ! -s /etc/ssl/certs/ca-certificates.crt ] && command -v apt-get >/dev/null 2>&1; then
              echo "CA bundle missing; attempting to install ca-certificates"
              if command -v sudo >/dev/null 2>&1; then
                sudo apt-get update -y && sudo apt-get install -y ca-certificates || true
              else
                apt-get update -y && apt-get install -y ca-certificates || true
              fi
            fi

            if command -v update-ca-certificates >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                sudo update-ca-certificates || true
              else
                update-ca-certificates || true
              fi
            fi

            if [ -s /etc/ssl/certs/ca-certificates.crt ]; then
              export NODE_EXTRA_CA_CERTS=/etc/ssl/certs/ca-certificates.crt
              export SSL_CERT_FILE=/etc/ssl/certs/ca-certificates.crt
              export REQUESTS_CA_BUNDLE=/etc/ssl/certs/ca-certificates.crt
              export GIT_SSL_CAINFO=/etc/ssl/certs/ca-certificates.crt
            fi
            export NODE_OPTIONS="${NODE_OPTIONS:-} --use-openssl-ca"
          }

          is_tls_error() {
            grep -Eqi 'certificate verification|unable to get local issuer certificate|self-signed certificate|CERT_|TLS|SSL' "$1"
          }

          sync_error_count() {
            local output_file="$1"
            local summary
            summary=$(grep -E 'Sync complete: [0-9]+ synced, [0-9]+ errors' "$output_file" | tail -1 || true)
            echo "$summary" | sed -n 's/.*Sync complete: [0-9][0-9]* synced, \([0-9][0-9]*\) errors.*/\1/p'
          }

          failed_paths_from_output() {
            local output_file="$1"
            local candidate_paths="$2"
            local failed_slugs

            failed_slugs=$(grep -Ei 'certificate verification|unable to get local issuer certificate|self-signed certificate|CERT_|TLS|SSL' "$output_file" \
              | sed -n -E 's/.*(Error syncing|failed for) ([^:]+):.*/\2/p' \
              | sort -u | tr '\n' ' ')

            if [ -z "$failed_slugs" ]; then
              return 0
            fi

            node - "$failed_slugs" "$candidate_paths" <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const failed = new Set((process.argv[2] || '').split(/\s+/).filter(Boolean));
          const candidates = (process.argv[3] || '').split(',').filter(Boolean);
          const out = [];

          for (const candidate of candidates) {
            const reportPath = path.join(candidate, 'skill-report.json');
            let slug = candidate.replace(/^skills\//, '').replace(/\//g, '-');
            try {
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              slug = report.meta?.slug || slug;
            } catch {
              // Keep the path-derived fallback.
            }

            if (failed.has(slug)) {
              out.push(candidate);
            }
          }

          process.stdout.write(out.join(','));
          NODE
          }

          run_sync_once() {
            local paths="$1"
            local concurrency="$2"
            local output_file="$3"

            set +e
            "$GITHUB_WORKSPACE/skillstore-cli" skill sync --slugs "$paths" --concurrency "$concurrency" 2>&1 | tee "$output_file"
            local rc=${PIPESTATUS[0]}
            set -e
            return "$rc"
          }

          # Run skillstore-cli sync command with parallel processing. If the
          # self-hosted runner hits a transient TLS/CA verification problem,
          # retry only the affected skills with a refreshed CA store and lower
          # concurrency instead of failing the whole workflow.
          : > sync-output.log
          CURRENT_PATHS="$SKILL_PATHS"
          SYNC_OK=false

          for ATTEMPT in 1 2 3 4; do
            configure_tls

            OUTPUT_FILE="sync-output-attempt-${ATTEMPT}.log"
            CONCURRENCY=10
            if [ "$ATTEMPT" -gt 1 ]; then
              CONCURRENCY=3
            fi

            echo "=== Sync attempt ${ATTEMPT}/4 (concurrency=${CONCURRENCY}) ===" | tee -a sync-output.log
            set +e
            run_sync_once "$CURRENT_PATHS" "$CONCURRENCY" "$OUTPUT_FILE"
            SYNC_RC=$?
            set -e
            cat "$OUTPUT_FILE" >> sync-output.log

            ERROR_COUNT=$(sync_error_count "$OUTPUT_FILE")
            ERROR_COUNT=${ERROR_COUNT:-0}

            if [ "$SYNC_RC" -eq 0 ] && [ "$ERROR_COUNT" -eq 0 ] && ! is_tls_error "$OUTPUT_FILE"; then
              SYNC_OK=true
              break
            fi

            if ! is_tls_error "$OUTPUT_FILE"; then
              echo "::error::skillstore-cli sync failed with non-TLS errors on attempt ${ATTEMPT}"
              break
            fi

            RETRY_PATHS=$(failed_paths_from_output "$OUTPUT_FILE" "$CURRENT_PATHS")
            if [ -z "$RETRY_PATHS" ]; then
              echo "::error::TLS error detected, but failed skills could not be mapped for retry"
              break
            fi

            if [ "$ATTEMPT" -eq 4 ]; then
              echo "::error::TLS errors remained after ${ATTEMPT} attempts"
              break
            fi

            echo "::warning::TLS certificate error during sync; retrying affected skills only: $RETRY_PATHS"
            CURRENT_PATHS="$RETRY_PATHS"
            sleep $((ATTEMPT * 15))
          done

          if [ "$SYNC_OK" != "true" ]; then
            SUMMARY=$(grep -E 'Sync complete: [0-9]+ synced, [0-9]+ errors' sync-output.log | tail -1 || true)
            echo "::error::skillstore-cli sync failed after retries: ${SUMMARY:-no summary}"
            exit 1
          fi

          SYNCED_SLUGS=$(grep -E 'Synced:' sync-output.log | sed -E 's/.*Synced: //' | sort -u | paste -sd, -)
          if [ -z "$SYNCED_SLUGS" ]; then
            SYNCED_SLUGS=$(tail -1 sync-output.log)
          fi
          if [ -z "$SYNCED_SLUGS" ] || echo "$SYNCED_SLUGS" | grep -q 'Sync complete:'; then
            echo "::error::skillstore-cli did not return synced slugs. Last line: $SYNCED_SLUGS"
            exit 1
          fi

          echo "synced_slugs=$SYNCED_SLUGS" >> $GITHUB_OUTPUT
          echo "::notice::Synced skills: $SYNCED_SLUGS"

      - name: Remove generated report evidence from synced audits
        if: steps.changes.outputs.skip_sync != 'true' && steps.sync.outputs.synced_slugs != ''
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SYNCED_SLUGS: ${{ steps.sync.outputs.synced_slugs }}
        run: |
          SANITIZED_COUNT=0
          SANITIZE_ERRORS=0

          rest_call() {
            local method="$1"
            local url="$2"
            local body_file="$3"
            local out_file="$4"
            local description="$5"
            local tmp_file="${out_file}.tmp"
            local status
            local curl_rc

            for attempt in 1 2 3 4; do
              rm -f "$tmp_file"

              if [ -n "$body_file" ]; then
                set +e
                status=$(curl -sS -o "$tmp_file" -w "%{http_code}" -X "$method" "$url" \
                  -H "apikey: ${SUPABASE_SERVICE_KEY}" \
                  -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
                  -H "Content-Type: application/json" \
                  -H "Accept-Profile: skillstore" \
                  -H "Content-Profile: skillstore" \
                  --connect-timeout 15 \
                  --max-time 60 \
                  -d @"$body_file")
                curl_rc=$?
                set -e
              else
                set +e
                status=$(curl -sS -o "$tmp_file" -w "%{http_code}" -X "$method" "$url" \
                  -H "apikey: ${SUPABASE_SERVICE_KEY}" \
                  -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
                  -H "Accept-Profile: skillstore" \
                  --connect-timeout 15 \
                  --max-time 60)
                curl_rc=$?
                set -e
              fi

              if [ "$curl_rc" -eq 0 ] && [[ "$status" =~ ^2 ]]; then
                mv "$tmp_file" "$out_file"
                return 0
              fi

              echo "::warning::${description} failed (attempt ${attempt}/4, curl=${curl_rc}, http=${status:-000})"
              if [ -s "$tmp_file" ]; then
                echo "::warning::Response preview: $(head -c 500 "$tmp_file" | tr '\n' ' ')"
              fi

              sleep $((attempt * 5))
            done

            return 1
          }

          patch_audit_evidence() {
            local audit_id="$1"
            local sanitized="$2"
            local body_file="patch-body-${audit_id}.json"
            local out_file="patch-response-${audit_id}.json"

            jq -n --argjson evidence "$sanitized" '{risk_factor_evidence: $evidence}' > "$body_file"
            rest_call PATCH "${SUPABASE_URL}/rest/v1/skill_security_audit?id=eq.${audit_id}" \
              "$body_file" "$out_file" "Patch audit evidence ${audit_id}"
          }

          sanitize_slug() {
            local slug="$1"
            local encoded_slug
            local skill_id
            local audits
            local safe_slug
            local skills_response
            local audits_response

            safe_slug=$(printf '%s' "$slug" | tr -c 'A-Za-z0-9_.-' '_')
            skills_response="skills-${safe_slug}.json"
            audits_response="audits-${safe_slug}.json"
            encoded_slug=$(printf '%s' "$slug" | jq -sRr @uri)
            if ! rest_call GET "${SUPABASE_URL}/rest/v1/skills?select=id&slug=eq.${encoded_slug}" \
              "" "$skills_response" "Fetch skill id for ${slug}"; then
              SANITIZE_ERRORS=$((SANITIZE_ERRORS + 1))
              return 0
            fi

            if ! skill_id=$(jq -r '.[0].id // empty' "$skills_response"); then
              echo "::warning::Invalid skill lookup response while sanitizing generated report evidence: $slug"
              SANITIZE_ERRORS=$((SANITIZE_ERRORS + 1))
              return 0
            fi

            if [ -z "$skill_id" ]; then
              echo "::warning::Skill not found while sanitizing generated report evidence: $slug"
              return 0
            fi

            if ! rest_call GET "${SUPABASE_URL}/rest/v1/skill_security_audit?select=id,risk_factor_evidence&skill_id=eq.${skill_id}" \
              "" "$audits_response" "Fetch audit evidence for ${slug}"; then
              SANITIZE_ERRORS=$((SANITIZE_ERRORS + 1))
              return 0
            fi

            if ! audits=$(jq -c '.' "$audits_response"); then
              echo "::warning::Invalid audit evidence response while sanitizing generated report evidence: $slug"
              SANITIZE_ERRORS=$((SANITIZE_ERRORS + 1))
              return 0
            fi
            while IFS= read -r audit; do
              local audit_id
              local original
              local sanitized

              audit_id=$(echo "$audit" | jq -r '.id')
              original=$(echo "$audit" | jq -c '.risk_factor_evidence // []')
              if ! sanitized=$(echo "$audit" | jq -c '
                [
                  (.risk_factor_evidence // [])[]
                  | {
                      factor,
                      evidence: ((.evidence // []) | map(select(.file != "skill-report.json")))
                    }
                  | select((.evidence | length) > 0)
                ]
              '); then
                SANITIZE_ERRORS=$((SANITIZE_ERRORS + 1))
                echo "::warning::Could not parse generated report evidence for ${slug} audit ${audit_id}; continuing sync workflow"
                continue
              fi

              if [ "$sanitized" != "$original" ]; then
                if patch_audit_evidence "$audit_id" "$sanitized"; then
                  SANITIZED_COUNT=$((SANITIZED_COUNT + 1))
                  echo "Sanitized generated report evidence for ${slug} audit ${audit_id}"
                else
                  SANITIZE_ERRORS=$((SANITIZE_ERRORS + 1))
                  echo "::warning::Could not sanitize generated report evidence for ${slug} audit ${audit_id}; continuing sync workflow"
                fi
              fi
            done < <(echo "$audits" | jq -c '.[]')
          }

          while IFS= read -r slug; do
            slug=$(echo "$slug" | sed 's|^skills/||' | xargs)
            [ -z "$slug" ] && continue
            sanitize_slug "$slug"
          done < <(echo "$SYNCED_SLUGS" | tr ',' '\n')

          echo "::notice::Generated report evidence cleanup complete: sanitized=${SANITIZED_COUNT}, errors=${SANITIZE_ERRORS}"
          if [ "$SANITIZE_ERRORS" -gt 0 ]; then
            echo "::warning::Generated report evidence cleanup had ${SANITIZE_ERRORS} error(s); sync succeeded and downstream jobs will continue"
            cat << EOF >> "$GITHUB_STEP_SUMMARY"
          ## Generated Report Evidence Cleanup Warning

          Sync succeeded, but cleanup of generated \`skill-report.json\` audit evidence had **${SANITIZE_ERRORS}** error(s).

          This cleanup is non-critical for publishing. Downstream scoring, translation, and cache jobs continued.
          EOF
          fi

      - name: Report sync status
        run: |
          echo "::notice::Sync completed - Mode: ${{ steps.changes.outputs.mode }}, Skills: ${{ steps.changes.outputs.changed_skills }}"

      - name: Save synced slugs to artifact
        if: steps.changes.outputs.skip_sync != 'true' && steps.sync.outputs.synced_slugs != ''
        env:
          SYNCED_SLUGS: ${{ steps.sync.outputs.synced_slugs }}
        run: |
          # Write slugs to file (one per line for easy processing)
          echo "$SYNCED_SLUGS" | tr ',' '\n' > synced-slugs.txt
          SLUG_COUNT=$(wc -l < synced-slugs.txt | tr -d ' ')
          echo "📦 Saved $SLUG_COUNT slugs to artifact"

      - name: Upload synced slugs artifact
        if: steps.changes.outputs.skip_sync != 'true' && steps.sync.outputs.synced_slugs != ''
        uses: actions/upload-artifact@v4
        with:
          name: synced-slugs
          path: synced-slugs.txt
          retention-days: 1

  # ============================================================
  # CALCULATE QUALITY SCORES
  # Calculates quality scores for synced skills using skillstore-cli
  # ============================================================
  calculate-scores:
    needs: sync
    if: needs.sync.outputs.skip_sync != 'true' && needs.sync.outputs.synced_slugs != ''
    runs-on: self-hosted
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          repositories: marketplace,skillstore

      - name: Download skillstore-cli
        uses: ./.github/actions/download-skillstore-cli
        with:
          token: ${{ steps.app-token.outputs.token }}
          cache-dir: /home/runner/_work/_cache/skillstore-cli

      - name: Calculate quality scores for synced skills
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SYNCED_SLUGS: ${{ needs.sync.outputs.synced_slugs }}
        run: |
          echo "🎯 Calculating quality scores (per-slug with retry)"

          # Delegate to the per-slug wrapper so a single breakdown update
          # failure (e.g. transient Supabase TimeoutError) is logged and
          # retried without aborting the whole sync. If every slug fails,
          # keep the job red instead of masking a global scoring failure.
          # GitHub Actions runs bash with `-e`; disable it while running
          # the wrapper so we can decide whether to continue after
          # partial failures.
          set +e
          bash scripts/recalculate-scores.sh \
            --cli "$GITHUB_WORKSPACE/skillstore-cli" \
            --slugs "$SYNCED_SLUGS" \
            --concurrency 5 \
            --max-attempts 3 \
            --retry-base-seconds 5 2>&1 | tee score-output.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e

          PROCESSED=$(grep -oP 'Processed:\s*\K\d+' score-output.log | tail -n1 || echo "0")
          UPDATED=$(grep -oP 'Updated:\s*\K\d+' score-output.log | tail -n1 || echo "0")
          ERRORS=$(grep -oP 'Errors:\s*\K\d+' score-output.log | tail -n1 || echo "0")
          SUCCESSFUL=$(( ${PROCESSED:-0} - ${ERRORS:-0} ))

          echo ""
          if [ $EXIT_CODE -ne 0 ]; then
            if [ "${PROCESSED:-0}" -eq 0 ] || [ "$SUCCESSFUL" -le 0 ]; then
              echo "::error::Quality scoring failed: no synced skills were scored successfully."
              exit "$EXIT_CODE"
            fi

            echo "::warning::Quality scoring reported $ERRORS error(s) after $PROCESSED processed / $UPDATED updated skill(s); continuing because it made progress."
          elif [ "${ERRORS:-0}" -gt 0 ]; then
            echo "::warning::Quality scoring completed with $ERRORS error(s) after $PROCESSED processed / $UPDATED updated skill(s)."
          else
            echo "✅ Quality score calculation complete"
          fi

  # ============================================================
  # CACHE INVALIDATION JOB
  # Invalidates API and page cache for synced skills
  # ============================================================
  cache-invalidate:
    needs: [sync, calculate-scores]
    if: needs.sync.outputs.skip_sync != 'true'
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Invalidate cache for synced skills
        id: invalidate
        continue-on-error: true
        env:
          SYNCED_SLUGS: ${{ needs.sync.outputs.synced_slugs }}
          SITE_URL: https://skillstore.io
          CACHE_INVALIDATE_SECRET: ${{ secrets.CACHE_INVALIDATE_SECRET }}
        run: |
          if [ -z "$SYNCED_SLUGS" ]; then
            echo "No slugs to invalidate"
            exit 0
          fi

          SLUGS_JSON=$(echo "$SYNCED_SLUGS" | tr ',' '\n' | jq -R . | jq -s .)

          echo "Invalidating cache for: $SYNCED_SLUGS"

          set +e
          RESPONSE=$(curl -sf -X POST "$SITE_URL/api/cache/invalidate" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CACHE_INVALIDATE_SECRET" \
            -d "{\"type\": \"skills\", \"slugs\": $SLUGS_JSON, \"invalidateApi\": true}" \
            --max-time 30 2>&1)
          EXIT_CODE=$?
          set -e

          if [ $EXIT_CODE -ne 0 ]; then
            echo "::warning::Cache invalidation failed (non-critical, continuing workflow)"
            echo "Response: $RESPONSE"
            echo "invalidation_failed=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "✅ Cache invalidated: $RESPONSE"
          echo "invalidation_failed=false" >> $GITHUB_OUTPUT

      - name: Report cache invalidation failure
        if: steps.invalidate.outputs.invalidation_failed == 'true'
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## ⚠️ Cache Invalidation Warning

          Cache invalidation failed for synced skills. This is non-critical and the workflow continued.
          Skills were synced successfully but may take longer to appear on the website.

          **Impact**: Low - Cache will expire naturally within 24 hours
          **Action Required**: None - Monitor next sync cycle
          EOF

  # ============================================================
  # CACHE WARMING JOB
  # Triggers warm-cache.yml workflow for synced skills only
  # ============================================================
  trigger-cache-warm:
    needs: [sync, calculate-scores, cache-invalidate]
    if: needs.sync.outputs.skip_sync != 'true' && inputs.skip_cache_warm != true
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Trigger warm-cache workflow for synced skills
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SYNCED_SLUGS: ${{ needs.sync.outputs.synced_slugs }}
        run: |
          if [ -z "$SYNCED_SLUGS" ]; then
            echo "No slugs to warm"
            exit 0
          fi

          SLUG_COUNT=$(echo "$SYNCED_SLUGS" | tr ',' '\n' | grep -c . || echo 0)
          THRESHOLD=500

          echo "🔥 Triggering warm-cache workflow for $SLUG_COUNT synced skills"

          if [ "$SLUG_COUNT" -le "$THRESHOLD" ]; then
            # Small batch: pass slugs directly via input
            echo "   Mode: direct (≤$THRESHOLD slugs)"
            gh workflow run warm-cache.yml \
              -f mode=warm \
              -f type=skills \
              -f slugs="$SYNCED_SLUGS" \
              -f warm_zip=false
            MODE="direct"
          else
            # Large batch: use artifact to avoid input size limits
            echo "   Mode: artifact (>$THRESHOLD slugs)"
            gh workflow run warm-cache.yml \
              -f mode=warm \
              -f type=skills \
              -f source_run_id=${{ github.run_id }} \
              -f warm_zip=false
            MODE="artifact (source: ${{ github.run_id }})"
          fi

          echo "✅ Cache warming workflow triggered"
          echo "   Monitor at: https://github.com/${{ github.repository }}/actions/workflows/warm-cache.yml"

          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 🔥 Cache Warming Triggered

          Triggered \`warm-cache.yml\` workflow for **$SLUG_COUNT synced skills** (mode: $MODE).

          [View workflow runs →](https://github.com/${{ github.repository }}/actions/workflows/warm-cache.yml)
          EOF

  # ============================================================
  # TRIGGER TRANSLATION (Async - Fire and Forget)
  # Uses repository_dispatch to start translation as a separate workflow run
  # This decouples sync from slow translation, completing sync faster
  # Translation only needs synced content, doesn't require scores
  # ============================================================
  trigger-translate:
    needs: [sync]
    if: needs.sync.outputs.skip_sync != 'true' && needs.sync.outputs.synced_slugs != ''
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Trigger translation workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SYNCED_SLUGS: ${{ needs.sync.outputs.synced_slugs }}
        run: |
          SLUG_COUNT=$(echo "$SYNCED_SLUGS" | tr ',' '\n' | grep -c . || echo 0)
          THRESHOLD=500

          echo "🌍 Triggering translation for $SLUG_COUNT synced skills"

          if [ "$SLUG_COUNT" -le "$THRESHOLD" ]; then
            # Small batch: pass slugs directly in payload
            echo "   Mode: direct (≤$THRESHOLD slugs)"
            gh api repos/${{ github.repository }}/dispatches \
              --method POST \
              -f event_type=translate-skills \
              -f "client_payload[skill_slugs]=$SYNCED_SLUGS" \
              -f "client_payload[triggered_by]=sync-to-supabase"
            MODE="direct"
          else
            # Large batch: use artifact to avoid payload size limits
            echo "   Mode: artifact (>$THRESHOLD slugs)"
            gh api repos/${{ github.repository }}/dispatches \
              --method POST \
              -f event_type=translate-skills \
              -f "client_payload[source_run_id]=${{ github.run_id }}" \
              -f "client_payload[triggered_by]=sync-to-supabase"
            MODE="artifact (source: ${{ github.run_id }})"
          fi

          echo "✅ Translation workflow triggered (mode: $MODE)"
          echo "   Monitor at: https://github.com/${{ github.repository }}/actions/workflows/translate-skills.yml"
