<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- 背景圆形 -->
  <circle cx="64" cy="64" r="60" fill="#4F46E5"/>

  <!-- 羊角图标 -->
  <path d="M44 35 Q50 20, 58 28" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M84 35 Q78 20, 70 28" stroke="#fff" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- 羊脸轮廓 -->
  <ellipse cx="64" cy="58" rx="28" ry="24" fill="#fff"/>

  <!-- 羊眼睛 -->
  <circle cx="54" cy="52" r="4" fill="#1F2937"/>
  <circle cx="74" cy="52" r="4" fill="#1F2937"/>

  <!-- 羊鼻子 -->
  <ellipse cx="64" cy="65" rx="8" ry="5" fill="#4F46E5"/>
  <circle cx="61" cy="65" r="1.5" fill="#fff"/>
  <circle cx="67" cy="65" r="1.5" fill="#fff"/>

  <!-- 供应链/云朵 -->
  <ellipse cx="40" cy="95" rx="16" ry="10" fill="#60A5FA"/>
  <ellipse cx="64" cy="100" rx="20" ry="12" fill="#60A5FA"/>
  <ellipse cx="88" cy="95" rx="16" ry="10" fill="#60A5FA"/>

  <!-- 箱子/包裹 -->
  <rect x="54" y="82" width="20" height="16" rx="2" fill="#fff"/>
  <line x1="64" y1="82" x2="64" y2="98" stroke="#4F46E5" stroke-width="2"/>
  <line x1="54" y1="90" x2="74" y2="90" stroke="#4F46E5" stroke-width="2"/>

  <!-- 箭头指示 -->
  <path d="M64 42 L64 50" stroke="#60A5FA" stroke-width="3" stroke-linecap="round"/>
  <path d="M60 46 L64 50 L68 46" stroke="#60A5FA" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
