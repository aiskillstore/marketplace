# 小羊云商供应链 API 技能配置文件
# 用于技能市场发布

name: legend-shop-supply-api
version: "1.0.0"
display_name: 小羊云商供应链 API
description: >
  小羊 LegendShop 供应链平台官方接入工具，提供商品查询、选品分析、一件代发等核心功能。
  支持21万+源头商品，实时价格库存查询，京东货源一件代发。

author: legendshop
category: business
tags:
  - 供应链
  - 电商
  - 商品查询
  - 一件代发
  - 货源
  - 选品

# 触发关键词
triggers:
  - 商品
  - 货源
  - 选品
  - 价格
  - 库存
  - 供应链
  - 一件代发
  - 货源清单
  - 资金
  - 余额
  - 小羊云商
  - legendshop

# 技能图标
icon: icon.svg

# 依赖
requirements:
  - requests

# 执行脚本
scripts:
  - path: scripts/api_client.py
    description: API 调用脚本

# 发布信息
publish:
  marketplace: WorkBuddy
  status: published
  price: free

# 联系方式
contact:
  website: https://www.legendshop.cn
  support: https://open.legendshop.cn
