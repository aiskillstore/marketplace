manifest_version: "1.0"
project:
  title: "Lu Hong — English Group Presentation"
  slide_count: 7
  created: "2026-05-23"

materials:
  - field: group_member_names
    type: text
    description: "小组成员姓名"
    used_in: [slide-1]
    status: ready
    source: user
    confidence: verified
    path: "provided in conversation"

  - field: lu_hong_portrait
    type: photo
    description: "陆鸿本人肖像照"
    used_in: [slide-2]
    status: ready
    source: user
    confidence: verified
    path: "materials/lu_hong.jpg"
    slot:
      aspect_ratio: "4:3"
      width_inches: 6
      height_inches: 4.5
    warnings:
      - type: aspect_mismatch
        message: "Photo is 1:1. User chose 'cover' fill mode — top/bottom will crop."

  - field: lu_hong_award_photo
    type: photo
    description: "陆鸿获奖现场照片"
    used_in: [slide-5]
    status: placeholder
    source: user
    confidence: placeholder
    slot:
      aspect_ratio: "16:9"

  - field: lu_hong_story_text
    type: text
    description: "陆鸿生平故事 (from tips.txt)"
    used_in: [slide-2, slide-3, slide-4]
    status: ready
    source: user
    confidence: verified
    path: "tips.txt"

  - field: career_timeline_dates
    type: data
    description: "陆鸿职业生涯关键日期"
    used_in: [slide-3]
    status: ready
    source: user
    confidence: verified
    path: "extracted from tips.txt"

  - field: achievement_list
    type: text
    description: "陆鸿主要成就列表"
    used_in: [slide-4]
    status: ready
    source: ai
    confidence: needs-review
    warnings:
      - type: overflow
        message: "Content ~280 chars, slot capacity ~150. AI will auto-adjust font size."

  - field: group_project_details
    type: text
    description: "英语小组项目信息"
    used_in: [slide-7]
    status: ready
    source: ai
    confidence: needs-review

  - field: contact_info
    type: text
    description: "小组成员联系方式"
    used_in: [slide-7]
    status: placeholder
    source: user
    confidence: placeholder

summary:
  total: 8
  ready: 6
  missing: 0
  ai_fill: 0
  placeholder: 2
  needs_review: 2
