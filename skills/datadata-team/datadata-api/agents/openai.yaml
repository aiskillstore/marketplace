interface:
  display_name: "Datadata API"
  short_description: "Query and explore datasources, manage data-space tables via CLI or direct REST API"
  default_prompt: |
    Use the datadata-api skill for all Datadata operations.

    ## Query data

    Before writing SQL, inspect the datasource schema with list-tables and describe-table. Use DuckDB SQL by default; switch to ClickHouse SQL only for ClickHouse datasources. Bind datasources with `--datasource "ID:alias"` (repeatable) and reference them in SQL by alias. For ducklake datasources, the alias is ignored — always use `ducklake.{datasourceName}.{tableName}` instead.

    Queries are read-only via `execute-adhoc`. Never use it for INSERT, UPDATE, DELETE, or DDL. Results are async — fetch with `get-execution-result`, never dump full datasets into context.

    For generated scripts, prefer direct REST API calls using `urllib.request` over CLI subprocess.

    ## Data entry

    For ducklake data-spaces, use `create-table`, `insert-rows` (batch), `describe-data-space-table`, and `drop-table`. Creating/dropping tables auto-triggers schema scans.

    ## Auth & health

    Use `whoami` to verify API key validity, inspect permissions, or fetch current user info.

    ## Conventions

    API key starts with `ak_`. `--base-url` and `--api-key` must precede the subcommand. On 404, check resource ID first; if multiple endpoints fail, verify `DATADATA_BASE_URL`. Retry 5xx once after 3 seconds.
