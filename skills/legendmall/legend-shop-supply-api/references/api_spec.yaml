openapi: 3.0.0
info:
  title: 小羊LegendShop 供应链平台
  description: 小羊云商供应链货源API，提供商品列表、商品详情、资金账号余额查询，支持AI与开发者调用
  version: 1.0.0
servers:
  - url: https://openapi.legendshop.cn
    description: 小羊官方API地址

paths:
  /portal/login/getToken:
    post:
      summary: 获取授权Token
      operationId: supply_get_token
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - client_id
                - client_secret
                - scope
              properties:
                client_id:
                  type: string
                  default: lflRYWthH1Kh9om9
                  description: 客户端ID
                client_secret:
                  type: string
                  default: K3RU8keFDTGrizHWviePHj3jc4iHSvUE
                  description: 客户端密钥
                scope:
                  type: string
                  default: shop
                  description: 权限范围，V2接口固定传 shop
      responses:
        '200':
          description: 成功返回 access_token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: 访问令牌
                  token_type:
                    type: string
                    description: 令牌类型
                  expires_in:
                    type: integer
                    description: 过期时间(秒)
                  scope:
                    type: string
                    description: 权限范围

  /open/v2/product/queryProdPage:
    post:
      summary: 商品池分页查询
      operationId: supply_goods_list
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                pageNum:
                  type: integer
                  default: 1
                  description: 页码
                pageSize:
                  type: integer
                  default: 12
                  description: 每页数量
      responses:
        '200':
          description: 成功返回商品ID列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: 是否成功
                  status:
                    type: string
                    description: 状态码
                  message:
                    type: string
                    description: 消息
                  data:
                    type: object
                    properties:
                      prods:
                        type: array
                        items:
                          type: string
                        description: 商品ID列表
                      totals:
                        type: integer
                        description: 总数

  /open/v2/product/getDetail:
    post:
      summary: 商品详情查询
      operationId: supply_goods_detail
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - prodId
              properties:
                prodId:
                  type: string
                  description: 商品ID（从queryProdPage获取）
      responses:
        '200':
          description: 成功返回商品详情

  /open/v2/captital/getAccount:
    post:
      summary: 查询开发者资金账号余额
      operationId: supply_account_balance
      security:
        - BearerAuth: []
      servers:
        - url: https://openapi.legendshop.cn
          description: 生产环境
        - url: http://openapi.legendmall.cn
          description: 测试环境
      requestBody:
        required: false
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: 成功返回资金账号余额
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: number
                    description: 状态码，1代表成功，其他代表失败
                    example: "1"
                  success:
                    type: boolean
                    description: 是否成功
                    example: true
                  message:
                    type: string
                    description: 返回信息消息
                    example: "消息"
                  data:
                    type: number
                    description: 开发者资金余额
                    example: "100.10"
              examples:
                success:
                  summary: 成功示例
                  value:
                    status: "1"
                    success: "true"
                    message: "消息"
                    data: "100.10"
        '2001':
          description: 用户权限不足，需要申请开通开发者账号
        '0000':
          description: 操作成功

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
